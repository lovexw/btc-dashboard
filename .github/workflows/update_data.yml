name: Update Bitcoin Dashboard

on:
  schedule:
    # 使用 cron 表达式，每 4 小时执行一次 (UTC时间)
    - cron: '0 */4 * * *'
  workflow_dispatch: # 允许你在 GitHub 网页上手动点击按钮运行测试

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖和浏览器
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: 运行抓取与翻译脚本
        env:
          # 从 GitHub Secrets 中读取你的 API Key 传递给 Python
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python test_dashboard.py

      - name: 提交并推送更新后的 JSON 文件
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add bitcoin_dashboard_v2_zh.json
          # 检查是否有文件变动，有变动才执行 commit 和 push
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update dashboard data"
          git push
